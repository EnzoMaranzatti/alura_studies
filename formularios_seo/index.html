<!DOCTYPE html>
<html>
<head lang="pt-BR">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Pesquisa Culturama</title>
</head>
<body>
	<header>
		<h1>Pesquisa Online</h1>
	<header>

	<section>
		<!--  
			action: URL para onde os dados vão
		-->
		<form action="" method="get">
			<!-- 
				Aqui começa um conjunto de elementos, os inputs tem relação entre si 
			-->
			<!-- Dados Pessoais -->
			<fieldset>
				<legend>Dados pessoais</legend>
				
				<label for="name">Nome completo</label>
				<input type="text" name="userName" required id="name" />
				<br>
				<label for="age">Idade</label>
				<input type="number" name="userAge" min="12" max="100" required id="age" />
				<br>	
				<label for="birthDate">Data de nascimento</label>
				<input type="date" name="userBirthDate" id="birthDate" />
				<br>
				<label for="email">Email</label>
				<input type="email" name="userEmail" required id="email" />
				<br>
				<label for="phone">Telefone</label>
				<input type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD + número sem espaço ou hífen" id="phone" />
				<br>
				<label for="image">Upload de foto</label>
				<input type="file" accept="image/*" name="userImage" id="image" />
				<br>
			</fieldset>

			<fieldset>
				<legend>Perfil</legend>
				<p>Gênero:</p>
				<input id="fem" type="radio" name="userGender" value="Feminino" id="feminino">
				<label for="fem">Feminino</label>

				<input id="masc" type="radio" name="userGender" value="Masculino">
				<label for="masc">Masculino</label>

				<input id="notInformed" type="radio" name="userGender" value="notInformed">
				<label for="notInformed">Prefiro não informar</label>

				<br/>

				<label for="maritalStatus">Estado civil</label>
				<select name="maritalStatus" id="maritalStatus">
					<option value="notInformed">Selecione...</option>
					<option value="Casado">Casado</option>
					<option value="Solteiro">Solteiro</option>
					<option value="Divorciado">Divorciado</option>
					<option value="União Estável">União Estável</option>
				</select>

				<label for="state">Estado</label>
				<select name="uf" id="state">
		      	<option value="Acre">Acre</option>
		      	<option value="Alagoas">Alagoas</option>
		      	<option value="Amapá">Amapá</option>
		      	<option value="Amazonas">Amazonas</option>
		      	<option value="Bahia">Bahia</option>
		      	<option value="Ceará">Ceará</option>
		      	<option value="Distrito Federal">Distrito Federal<	option>
		      	<option value="Espirito Santo">Espirito Santo</option>
		      	<option value="Goiás">Goiás</option>
		      	<option value="Maranhão">Maranhão</option>
		      	<option value="Mato Grosso do Sul">Mato Grosso do Sul<	option>
		      	<option value="Mato Grosso">Mato Grosso</option>
		      	<option value="Minas Gerais">Minas Gerais</option>
		      	<option value="Pará">Pará</option>
		      	<option value="Paraíba">Paraíba</option>
		      	<option value="Paraná">Paraná</option>
		      	<option value="Pernambuco">Pernambuco</option>
		      	<option value="Piauí">Piauí</option>
		      	<option value="Rio de Janeiro">Rio de Janeiro</option>
		      	<option value="Rio Grande do Norte">Rio Grande do Nort	</option>
		      	<option value="Rio Grande do Sul">Rio Grande do Sul<	option>
		      	<option value="Rondônia">Rondônia</option>
		      	<option value="Roraima">Roraima</option>
		      	<option value="Santa Catarina">Santa Catarina</option>
		      	<option value="São Paulo">São Paulo</option>
		      	<option value="Sergipe">Sergipe</option>
		      	<option value="Tocantins">Tocantins</option>
				</select>

				<br />
				<label for="city">Cidade</label>
				<input type="text" name="userCity" id="city">
			</fieldset>

			<fieldset>
				<legend>Hábitos</legend>
				<p>Redes sociais</p>
				<input type="checkbox" name="social" value="instagram" id="instagram">
				<label for="instagram">Instagram</label>
				<br/>

				<input type="checkbox" name="social" value="facebook" id="facebook">
				<label for="facebook">Facebook</label>
				<br/>

				<input type="checkbox" name="social" value="linkedin" id="linkedin">
				<label for="linkedin">Linkedin</label>
				<br/>

				<input type="checkbox" name="social" value="X" id="X">
				<label for="X">X</label>
				<br/>

				<label for="musicStyle">Estilo musical:</label>
				<input list="styleTypes" id="musicStyle" name="userMusicStyle" type="text">
				<datalist id="styleTypes">
					<option value="Rock">
					<option value="Pop">
					<option value="Samba">
					<option value="Sertenejo">
				</datalist>

				<br/>

				<label for="favoriteColor">Cor favorita</label>
				<input type="color" name="userFavoriteColor" id="favoriteColor">
			</fieldset>

			<fieldset>
				<legend>Opniões</legend>

				<p>Satisfação:</p>
				<input id="otima" type="radio" name="userSatisfaction" value="Otima">
				<label for="otima">Ótima</label>

				<input id="boa" type="radio" name="userSatisfaction" value="Boa">
				<label for="boa">Boa</label>

				<input id="regular" type="radio" name="userSatisfaction" value="Regular">
				<label for="regular">Regular</label>

				<input id="ruim" type="radio" name="userSatisfaction" value="Ruim">
				<label for="ruim">Ruim</label>

				<br/>

				<label for="comment">Escreva sua opnião:</label><br/>
				<textarea id="comment" name="userComment" placeholder="Digite aqui sua opnião..."></textarea>
			</fieldset>
			
			<fieldset>
				<legend>Confirmações</legend>

				<input type="checkbox" name="userLgpd" id="userLgpdTerm" value="confirmed">
				<label for="userLgpdTerm">Eu aceito participar da pesquisa</label>

				<input type="checkbox" name="userGetResult" id="getResult" value="accepted">
				<label for="getResult">Desejo receber o resultado por email</label>


			</fieldset>

			<button type="submit">Enviar</button>
			<button type="reset">Limpar</button>

		</form>
	</section>
</body>
</html>
